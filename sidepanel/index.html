<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Knowledge Graph</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="panel">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1 class="title">Knowledge Graph</h1>
        <span class="subtitle" id="stats">等待提取对话...</span>
      </div>
      <div class="header-right">
        <button id="btn-refresh" class="btn" title="刷新">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
            <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
          </svg>
        </button>
        <button id="btn-center" class="btn" title="居中全部">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/>
          </svg>
        </button>
        <button id="btn-latest" class="btn btn-accent" title="聚焦最新对话">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Legend -->
    <div class="legend">
      <span class="legend-item"><span class="dot dot-latest"></span>最新对话</span>
      <span class="legend-item"><span class="dot dot-concept"></span>概念</span>
      <span class="legend-item"><span class="dot dot-entity"></span>实体</span>
      <span class="legend-item"><span class="dot dot-tech"></span>技术术语</span>
    </div>

    <!-- Graph Canvas -->
    <div class="graph-container" id="graph-container">
      <canvas id="graph-canvas"></canvas>
      <div class="empty-state" id="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="5.5" cy="11.5" r="2.5"/><circle cx="18.5" cy="5.5" r="2.5"/>
          <circle cx="18.5" cy="18.5" r="2.5"/><line x1="7.5" y1="10" x2="16" y2="6.5"/>
          <line x1="7.5" y1="13" x2="16" y2="17.5"/>
        </svg>
        <p>打开 Gemini 对话页面</p>
        <p class="sub">插件将自动提取对话内容并生成知识图谱</p>
      </div>
    </div>

    <!-- Detail Drawer -->
    <div class="detail-drawer" id="detail-drawer">
      <div class="drawer-header">
        <span class="drawer-title" id="drawer-title"></span>
        <button class="btn btn-small" id="btn-close-drawer">&times;</button>
      </div>
      <div class="drawer-body" id="drawer-body"></div>
    </div>

  </div>

  <script src="graph.js"></script>
</body>
</html>
